<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리 예산 신청 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- SheetJS CDN: 엑셀 파일 생성을 위한 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F5F4F0;--s:#fff;--b:#E4E2DA;--t:#1C1B18;--m:#8A8780;--a:#1D4ED8;--g:#15803D;--r:#B91C1C}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh;line-height:1.5}
nav{background:var(--t);color:#fff;height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nt{font-size:15px;font-weight:800;letter-spacing:-0.5px}
.tabs{display:flex;gap:4px}
.tab{background:none;border:none;color:rgba(255,255,255,.5);font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;cursor:pointer;transition:0.2s}
.tab.on,.tab:hover{color:#fff;background:rgba(255,255,255,.15)}

.page{display:none;max-width:900px;margin:0 auto;padding:24px 20px}
.page.on{display:block}
.card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.h{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

label{display:block;font-size:11px;font-weight:700;color:var(--m);margin-bottom:6px;text-transform:uppercase}
input,textarea{width:100%;border:1.5px solid var(--b);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--t);background:var(--bg);outline:none;transition:0.2s}
input:focus,textarea:focus{border-color:var(--a);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,0.1)}
textarea{resize:vertical;min-height:80px}

.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:600px){.r2{grid-template-columns:1fr}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:0.2s;white-space:nowrap}
.bp{background:var(--a);color:#fff}.bp:hover{background:#1e40af}
.bg2{background:var(--s);color:var(--m);border:1.5px solid var(--b)}.bg2:hover{color:var(--t);border-color:#999}
.bG{background:var(--g);color:#fff}.bG:hover{background:#166534}
.sm{padding:6px 12px;font-size:12px}

.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.pc{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.pc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);border-color:var(--a)}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.pn{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center}
.pd{font-size:13px;color:var(--m);margin-bottom:12px;flex-grow:1}
.pm{font-size:11px;color:var(--m);font-weight:600;padding-top:10px;border-top:1px solid var(--bg)}

.proj-actions{display:flex;gap:6px;margin-top:12px}
.btn-edit, .btn-del-proj, .btn-sm-act{background:none;border:1px solid var(--b);color:var(--m);font-size:11px;padding:4px 8px;border-radius:6px;cursor:pointer}
.btn-edit:hover{border-color:var(--a);color:var(--a)}
.btn-del-proj:hover{background:#fef2f2;border-color:var(--r);color:var(--r)}

.tbl-wrapper{overflow-x:auto;margin-top:10px}
.tbl{width:100%;border-collapse:collapse;min-width:600px}
.tbl th{font-size:11px;color:var(--m);padding:12px 10px;text-align:left;border-bottom:2px solid var(--b);background:var(--bg)}
.tbl td{padding:12px 10px;border-bottom:1px solid var(--b);font-size:13px}
.bk{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.vd{background:#dcfce7;color:var(--g)} .vs{background:#dbeafe;color:var(--a)} .vp{background:#fef3c7;color:#92400e}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--t);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;transition:0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);z-index:1000}
.toast.on{transform:translateX(-50%) translateY(0)}

/* 관리자 레이아웃 */
.st{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--s);padding:16px;border-radius:12px;border:1px solid var(--b)}
.sv{font-size:22px;font-weight:800;margin-top:4px}
@media(max-width:600px){.st{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="nt">🚀 CLUB BUDGET MANAGER</div>
  <div class="tabs">
    <button id="ti" class="tab on">신청하기</button>
    <button id="ta" class="tab">관리자 현황</button>
  </div>
</nav>

<!-- 페이지: 리스트 및 신청 -->
<div id="pi" class="page on">
  <div id="vss">
    <div class="h">프로젝트 목록</div>
    <div id="pg" class="pg"></div>
    <button id="btn-showf" class="btn bp">+ 새 프로젝트 만들기</button>

    <!-- 프로젝트 등록 폼 -->
    <div id="nf" class="card" style="display:none; margin-top:20px">
      <div class="h" id="nf-title">신규 프로젝트</div>
      <div class="r2">
        <div><label>프로젝트명</label><input id="nn" placeholder="예: 스마트 팜"></div>
        <div><label>팀장(대표자)</label><input id="nl" placeholder="이름 입력"></div>
      </div>
      <label>간단 소개</label>
      <textarea id="nd" placeholder="활동 내용을 적어주세요"></textarea>
      <div style="margin-top:15px; display:flex; gap:10px; align-items:center">
        <label style="margin-bottom:0">팀 컬러</label>
        <div id="cp" style="display:flex; gap:8px"></div>
      </div>
      <div style="margin-top:20px; display:flex; gap:8px">
        <button id="btn-mkproj" class="btn bp">저장하기</button>
        <button id="btn-hidef" class="btn bg2">취소</button>
      </div>
    </div>
  </div>

  <!-- 페이지: 부품 상세 입력 -->
  <div id="vsp" style="display:none">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px">
      <button id="btn-back" class="btn bg2 sm">← 목록으로</button>
      <div style="text-align:right">
        <div id="an" style="font-size:18px; font-weight:800"></div>
        <div id="al" style="font-size:12px; color:var(--m)"></div>
      </div>
    </div>

    <div class="card">
      <div class="h">📦 부품 추가하기</div>
      <div class="r2">
        <div><label>부품명</label><input id="ptn" placeholder="정확한 명칭"></div>
        <div><label>사용 용도</label><input id="ptu" placeholder="어디에 쓰나요?"></div>
      </div>
      <div class="r2">
        <div><label>수량</label><input id="ptq" type="number" value="1"></div>
        <div><label>단가(원)</label><input id="ptp" type="number" placeholder="0"></div>
      </div>
      <label>구매 링크</label>
      <input id="ptk" type="url" placeholder="https://...">
      <div style="margin-top:15px">
        <button id="btn-addpart" class="btn bp" style="width:100%">리스트에 추가</button>
      </div>
    </div>

    <div class="card">
      <div class="h">신청 부품 내역</div>
      <div id="ptw" class="tbl-wrapper">
        <table class="tbl">
          <thead>
            <tr><th>부품명</th><th>수량</th><th>금액</th><th>상태</th><th>관리</th></tr>
          </thead>
          <tbody id="ptb"></tbody>
        </table>
      </div>
      <div style="margin-top:15px; text-align:right">
        <strong id="tl" style="font-size:16px; color:var(--a)"></strong>
      </div>
      <div style="margin-top:15px; border-top:1px solid var(--b); padding-top:15px">
        <button id="sbb" class="btn bG" style="width:100%">최종 제출하기 (수정불가)</button>
      </div>
    </div>
  </div>
</div>

<!-- 페이지: 관리자 -->
<div id="pa" class="page">
  <div class="h">전체 예산 집행 현황</div>
  <div id="ast" class="st"></div>
  <div style="margin-bottom:20px; display:flex; gap:10px">
    <button id="btn-dlxls" class="btn bG">📊 엑셀로 내보내기</button>
    <button id="btn-clrall" class="btn bg2 sm">전체 초기화</button>
  </div>
  <div id="ac"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const DB_KEY = "club_budget_v1";
const COLORS = ["#2563eb","#16a34a","#dc2626","#d97706","#7c3aed","#db2777","#0891b2"];
let curProjId = null;
let selColorIdx = 0;

// [데이터 엔진]
const db = {
  load() {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : { projects: [], items: [] };
  },
  save(data) {
    localStorage.setItem(DB_KEY, JSON.stringify(data));
    this.refresh();
  },
  refresh() {
    renderProjectGrid();
    renderAdminView();
  }
};

// [초기화 및 렌더링]
function init() {
  const data = db.load();
  renderProjectGrid();
  makeColorPicker();
  
  // 이벤트 연결
  document.getElementById('ti').onclick = () => switchPage('i');
  document.getElementById('ta').onclick = () => {
    const pw = prompt("관리자 비밀번호를 입력하세요.");
    if(pw === "1847") switchPage('a');
    else alert("비밀번호가 틀렸습니다.");
  };
  document.getElementById('btn-showf').onclick = () => document.getElementById('nf').style.display = 'block';
  document.getElementById('btn-hidef').onclick = () => document.getElementById('nf').style.display = 'none';
  document.getElementById('btn-mkproj').onclick = createProject;
  document.getElementById('btn-back').onclick = () => {
    curProjId = null;
    document.getElementById('vsp').style.display = 'none';
    document.getElementById('vss').style.display = 'block';
  };
  document.getElementById('btn-addpart').onclick = addPart;
  document.getElementById('sbb').onclick = submitAllParts;
  document.getElementById('btn-dlxls').onclick = downloadExcel;
  document.getElementById('btn-clrall').onclick = resetAll;
}

function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('on'));
  document.getElementById('p' + p).classList.add('on');
  document.getElementById('t' + p).classList.add('on');
  if(p === 'a') renderAdminView();
}

// [프로젝트 관리]
function makeColorPicker() {
  const container = document.getElementById('cp');
  COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.style.width = '24px';
    dot.style.height = '24px';
    dot.style.borderRadius = '50%';
    dot.style.backgroundColor = c;
    dot.style.cursor = 'pointer';
    dot.style.border = i === 0 ? '3px solid #000' : '3px solid transparent';
    dot.onclick = () => {
      selColorIdx = i;
      Array.from(container.children).forEach((el, idx) => el.style.borderColor = idx === i ? '#000' : 'transparent');
    };
    container.appendChild(dot);
  });
}

function createProject() {
  const name = document.getElementById('nn').value.trim();
  const lead = document.getElementById('nl').value.trim();
  const desc = document.getElementById('nd').value.trim();
  if(!name || !lead) return alert("필수 정보를 입력하세요.");

  const data = db.load();
  const newProj = {
    id: 'p_' + Date.now(),
    name, lead, desc,
    color: COLORS[selColorIdx]
  };
  data.projects.push(newProj);
  db.save(data);
  document.getElementById('nf').style.display = 'none';
  showToast("프로젝트가 생성되었습니다.");
}

function renderProjectGrid() {
  const data = db.load();
  const container = document.getElementById('pg');
  container.innerHTML = '';
  
  data.projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pc';
    card.style.borderTop = `4px solid ${p.color}`;
    card.innerHTML = `
      <div class="pn"><span class="dot" style="background:${p.color}"></span>${p.name}</div>
      <div class="pd">${p.desc || '설명 없음'}</div>
      <div class="pm">👤 ${p.lead}</div>
      <div class="proj-actions">
        <button class="btn-del-proj" onclick="deleteProject(event, '${p.id}')">삭제</button>
      </div>
    `;
    card.onclick = () => openProject(p.id);
    container.appendChild(card);
  });
}

function deleteProject(e, id) {
  e.stopPropagation();
  if(!confirm("프로젝트와 모든 부품 내역이 사라집니다. 삭제할까요?")) return;
  const data = db.load();
  data.projects = data.projects.filter(p => p.id !== id);
  data.items = data.items.filter(i => i.pid !== id);
  db.save(data);
}

// [부품 관리]
function openProject(id) {
  curProjId = id;
  const data = db.load();
  const p = data.projects.find(x => x.id === id);
  document.getElementById('vss').style.display = 'none';
  document.getElementById('vsp').style.display = 'block';
  document.getElementById('an').innerText = p.name;
  document.getElementById('an').style.color = p.color;
  document.getElementById('al').innerText = `대표자: ${p.lead}`;
  renderParts();
}

function addPart() {
  const name = document.getElementById('ptn').value.trim();
  const usage = document.getElementById('ptu').value.trim();
  const qty = parseInt(document.getElementById('ptq').value) || 0;
  const price = parseInt(document.getElementById('ptp').value) || 0;
  const link = document.getElementById('ptk').value.trim();

  if(!name || qty < 1) return alert("부품명과 수량을 확인하세요.");

  const data = db.load();
  data.items.push({
    id: 'i_' + Date.now(),
    pid: curProjId,
    name, usage, qty, price, link,
    status: 'pending' // pending, submitted, completed
  });
  db.save(data);
  renderParts();
  showToast("부품이 리스트에 추가되었습니다.");
}

function renderParts() {
  const data = db.load();
  const items = data.items.filter(i => i.pid === curProjId);
  const tbody = document.getElementById('ptb');
  tbody.innerHTML = '';
  
  let total = 0;
  items.forEach(i => {
    const subtotal = i.qty * i.price;
    total += subtotal;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${i.name}</strong><br><small style="color:var(--m)">${i.usage}</small></td>
      <td>${i.qty}</td>
      <td>${subtotal.toLocaleString()}원</td>
      <td><span class="bk ${i.status==='pending'?'vp':'vs'}">${i.status==='pending'?'작성중':'제출됨'}</span></td>
      <td>
        ${i.status === 'pending' ? `<button class="btn-sm-act" onclick="deleteItem('${i.id}')">삭제</button>` : '-'}
      </td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('tl').innerText = `총 예상 소요 예산: ${total.toLocaleString()}원`;
}

function deleteItem(id) {
  const data = db.load();
  data.items = data.items.filter(i => i.id !== id);
  db.save(data);
  renderParts();
}

function submitAllParts() {
  if(!confirm("제출 후에는 수정할 수 없습니다. 정말 제출할까요?")) return;
  const data = db.load();
  data.items.forEach(i => {
    if(i.pid === curProjId && i.status === 'pending') i.status = 'submitted';
  });
  db.save(data);
  renderParts();
  showToast("성공적으로 제출되었습니다.");
}

// [관리자 기능]
function renderAdminView() {
  const data = db.load();
  const container = document.getElementById('ac');
  const stats = document.getElementById('ast');
  container.innerHTML = '';

  let totalBudget = 0;
  let submittedCount = 0;

  data.projects.forEach(p => {
    const pItems = data.items.filter(i => i.pid === p.id && i.status !== 'pending');
    if(pItems.length === 0) return;

    const pSum = pItems.reduce((acc, cur) => acc + (cur.qty * cur.price), 0);
    totalBudget += pSum;
    submittedCount += pItems.length;

    const section = document.createElement('div');
    section.className = 'card';
    section.style.borderLeft = `6px solid ${p.color}`;
    section.innerHTML = `
      <div class="h" style="justify-content:space-between">
        <span>${p.name} (${p.lead})</span>
        <span style="color:var(--a)">${pSum.toLocaleString()}원</span>
      </div>
      <div class="tbl-wrapper">
        <table class="tbl">
          <thead><tr><th>부품</th><th>단가</th><th>합계</th><th>상태</th></tr></thead>
          <tbody>
            ${pItems.map(i => `
              <tr>
                <td>${i.name}</td>
                <td>${i.price.toLocaleString()}</td>
                <td>${(i.qty * i.price).toLocaleString()}</td>
                <td><button class="btn-sm-act ${i.status==='completed'?'vd':''}" onclick="toggleComplete('${i.id}')">
                  ${i.status==='completed'?'✅ 구매완료':'구매전'}
                </button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
    container.appendChild(section);
  });

  stats.innerHTML = `
    <div class="sc"><label>참여 팀</label><div class="sv">${data.projects.length}</div></div>
    <div class="sc"><label>제출 품목</label><div class="sv">${submittedCount}</div></div>
    <div class="sc"><label>총 소요 예산</label><div class="sv" style="color:var(--a)">${totalBudget.toLocaleString()}원</div></div>
  `;
}

function toggleComplete(id) {
  const data = db.load();
  const item = data.items.find(i => i.id === id);
  item.status = item.status === 'completed' ? 'submitted' : 'completed';
  db.save(data);
}

function resetAll() {
  if(confirm("모든 데이터가 초기화됩니다. 계속할까요?")) {
    localStorage.removeItem(DB_KEY);
    location.reload();
  }
}

// [엑셀 다운로드]
function downloadExcel() {
  const data = db.load();
  const rows = [["프로젝트", "팀장", "부품명", "수량", "단가", "합계", "링크", "상태"]];
  
  data.items.filter(i => i.status !== 'pending').forEach(i => {
    const p = data.projects.find(x => x.id === i.pid);
    rows.push([
      p.name, p.lead, i.name, i.qty, i.price, i.qty * i.price, i.link, i.status
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "예산신청현황");
  XLSX.writeFile(wb, `동아리예산신청_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}

window.onload = init;
</script>

</body>
</html>
